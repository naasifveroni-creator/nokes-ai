<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOKES · Neuro Optimizers Knowledge Exploration Systems</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --bg: #0b0b1a;
            --surface: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
            --primary: #a78bfa;
            --secondary: #6ee7b7;
            --accent: #f472b6;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --radius: 24px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        /* Animated background */
        .bg-glow {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(circle at 50% 0%, rgba(167,139,250,0.15), transparent 70%),
                        radial-gradient(circle at 0% 100%, rgba(110,231,183,0.1), transparent 70%);
            animation: moveGlow 20s ease-in-out infinite;
        }
        @keyframes moveGlow {
            0%,100% { transform: translate(0,0); }
            50% { transform: translate(10%,5%); }
        }

        /* App container */
        .app {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            height: 100%; max-width: 700px;
            margin: 0 auto; width: 100%;
        }

        /* Header */
        .header {
            padding: 16px 20px;
            display: flex; align-items: center; gap: 12px;
            background: rgba(11,11,26,0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        .logo-icon { font-size: 32px; }
        .brand { flex:1; }
        .brand h1 {
            font-size: 22px; font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand p { font-size: 10px; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }
        .status {
            display: flex; align-items: center; gap: 6px;
            background: var(--surface); padding: 6px 12px;
            border-radius: 20px; font-size: 12px; color: var(--text-secondary);
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #10b981; box-shadow: 0 0 8px #10b981;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* Chat area */
        .chat {
            flex: 1; overflow-y: auto; padding: 20px 16px;
            display: flex; flex-direction: column; gap: 18px;
        }
        .message {
            display: flex; gap: 10px; max-width: 85%;
            animation: slideUp 0.3s ease-out;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } }

        .avatar {
            width: 38px; height: 38px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
            background: var(--surface); backdrop-filter: blur(10px);
        }
        .bubble {
            padding: 14px 18px; border-radius: 20px;
            line-height: 1.5; font-size: 15px;
            background: var(--surface); backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            word-break: break-word;
        }
        .user .bubble {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border: none; color: white;
        }
        .bubble strong { color: var(--secondary); }
        .bubble code {
            background: rgba(0,0,0,0.3); padding: 2px 6px;
            border-radius: 8px; font-size: 13px;
        }

        /* File attachment card */
        .file-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 12px; margin-top: 8px;
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; transition: 0.2s;
        }
        .file-card:hover { background: rgba(167,139,250,0.1); }
        .file-icon { font-size: 28px; }

        /* Input area */
        .input-area {
            padding: 12px 16px calc(12px + var(--safe-bottom));
            background: rgba(11,11,26,0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; gap: 10px; align-items: flex-end;
            z-index: 10;
        }
        .input-wrapper {
            flex: 1; display: flex; align-items: flex-end;
            background: var(--surface); border-radius: 28px;
            border: 1px solid var(--border); padding: 6px 8px;
            transition: 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--primary); box-shadow: 0 0 15px rgba(167,139,250,0.2);
        }
        textarea {
            flex: 1; background: transparent; border: none;
            color: var(--text); font-size: 16px; resize: none;
            padding: 8px 12px; max-height: 120px; outline: none;
            font-family: inherit;
        }
        textarea::placeholder { color: var(--text-secondary); }
        .attach-btn, .send-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text); font-size: 18px; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; flex-shrink: 0;
        }
        .attach-btn:active, .send-btn:active { transform: scale(0.95); }
        .send-btn {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border: none; color: white; font-size: 22px;
        }
        .attach-btn input { display: none; }

        /* API settings floating button */
        .settings-btn {
            position: fixed; top: 16px; right: 16px;
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--surface); backdrop-filter: blur(10px);
            border: 1px solid var(--border); z-index: 20;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; color: var(--text);
        }
        .settings-panel {
            position: fixed; top: 0; right: 0; width: 320px; height: 100vh;
            background: rgba(15,15,30,0.95); backdrop-filter: blur(30px);
            border-left: 1px solid var(--border); z-index: 30;
            padding: 20px; transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
        }
        .settings-panel.open { transform: translateX(0); }
        .settings-panel h3 { color: var(--primary); margin-bottom: 8px; }
        .settings-panel select, .settings-panel input {
            width: 100%; padding: 12px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 14px;
            color: var(--text); font-size: 14px; outline: none;
        }
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 25; display: none;
        }
        .overlay.show { display: block; }

        @media (max-width: 400px) {
            .brand h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <!-- Settings panel -->
    <div class="overlay" id="overlay" onclick="toggleSettings()"></div>
    <div class="settings-panel" id="settingsPanel">
        <h3>⚙️ AI Configuration</h3>
        <select id="provider" onchange="updateModelList()">
            <option value="simulation">🧪 Simulation Mode (No API Key)</option>
            <option value="openai">OpenAI (GPT-4)</option>
            <option value="anthropic">Anthropic (Claude)</option>
            <option value="google">Google (Gemini)</option>
        </select>
        <input type="password" id="apiKey" placeholder="API Key (only for cloud AI)" />
        <select id="model"></select>
        <p style="font-size:12px; color:var(--text-secondary)">Your key is stored locally, never uploaded.</p>
        <button onclick="saveSettings()" style="background:var(--primary); border:none; padding:12px; border-radius:14px; color:white; font-weight:bold; margin-top:auto;">Save & Close</button>
    </div>

    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="logo-icon">🧠</div>
            <div class="brand">
                <h1>NOKES</h1>
                <p>Neuro Optimizers Knowledge Exploration Systems</p>
            </div>
            <div class="status"><span class="status-dot"></span> Ready</div>
        </div>

        <!-- Chat -->
        <div class="chat" id="chat">
            <div class="message assistant">
                <div class="avatar">🧠</div>
                <div class="bubble">
                    <strong>NOKES online.</strong><br>
                    I create <strong>Excel dashboards</strong>, <strong>PowerPoint presentations</strong>, analyze data, and more.<br><br>
                    <em>Try: “Create a sales tracker Excel” or “Make a 5-slide pitch deck”</em>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <label class="attach-btn">
                📎 <input type="file" id="fileInput" multiple accept=".csv,.xlsx,.json,.txt" onchange="handleFiles(this.files)">
            </label>
            <div class="input-wrapper">
                <textarea id="userInput" rows="1" placeholder="Ask NOKES to create anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
            </div>
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <!-- Settings toggle -->
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

    <script>
        // ========== GLOBAL STATE ==========
        let filesForContext = [];
        let generatedFiles = [];
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');

        // ========== SETTINGS ==========
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
        function updateModelList() {
            const prov = document.getElementById('provider').value;
            const modelSelect = document.getElementById('model');
            const models = {
                simulation: [{v:'sim',t:'Simulated AI'}],
                openai: [{v:'gpt-4-turbo',t:'GPT-4 Turbo'},{v:'gpt-4',t:'GPT-4'}],
                anthropic: [{v:'claude-3-opus',t:'Claude 3 Opus'}],
                google: [{v:'gemini-pro',t:'Gemini Pro'}]
            };
            modelSelect.innerHTML = models[prov].map(m => `<option value="${m.v}">${m.t}</option>`).join('');
        }
        function saveSettings() {
            localStorage.setItem('nokes_provider', document.getElementById('provider').value);
            localStorage.setItem('nokes_api_key', document.getElementById('apiKey').value);
            localStorage.setItem('nokes_model', document.getElementById('model').value);
            toggleSettings();
            addMessage('assistant','⚙️ Settings saved. Current mode: <strong>' + (document.getElementById('provider').value === 'simulation' ? 'Simulation (works offline)' : 'Cloud AI') + '</strong>.');
        }
        // Load saved
        (function loadStored() {
            if(localStorage.getItem('nokes_provider')) document.getElementById('provider').value = localStorage.getItem('nokes_provider');
            if(localStorage.getItem('nokes_api_key')) document.getElementById('apiKey').value = localStorage.getItem('nokes_api_key');
            updateModelList();
            if(localStorage.getItem('nokes_model')) document.getElementById('model').value = localStorage.getItem('nokes_model');
        })();

        // ========== CHAT ==========
        function addMessage(role, html) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="avatar">${role==='user'?'👤':'🧠'}</div><div class="bubble">${html}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function typingIndicator() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'message assistant';
            div.innerHTML = `<div class="avatar">🧠</div><div class="bubble"><span class="dot-pulse">⋯</span></div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return id;
        }

        function removeTyping(id) {
            const el = document.getElementById(id);
            if(el) el.remove();
        }

        // ========== FILE HANDLING ==========
        function handleFiles(fileList) {
            filesForContext = [];
            Array.from(fileList).forEach(f => {
                const reader = new FileReader();
                reader.onload = e => {
                    filesForContext.push({name:f.name, data:e.target.result});
                };
                reader.readAsText(f);
            });
            addMessage('user', `📎 Attached ${fileList.length} file(s)`);
        }

        // ========== DOCUMENT GENERATION ==========
        function generateExcel(filename = 'NOKES_Dashboard.xlsx', customData = null) {
            const wb = XLSX.utils.book_new();
            let data = customData || [
                ['Date','Category','Revenue','Status'],
                ['2024-07-01','Product A',15000,'Completed'],
                ['2024-07-02','Product B',12500,'In Progress'],
                ['2024-07-03','Service',18000,'Completed'],
                ['2024-07-04','Product A',22000,'Pending'],
                ['2024-07-05','Service',19500,'Completed']
            ];
            const ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, 'Dashboard');
            const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
            const blob = new Blob([wbout], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
            saveAs(blob, filename);
            addMessage('assistant', `📊 <strong>Excel generated:</strong> ${filename} <button onclick="saveAs(new Blob(['${blob.size}']),'${filename}')" style="background:var(--primary);border:none;color:white;padding:4px 8px;border-radius:8px;margin-left:8px;">⬇️ Download Again</button>`);
        }

        function generatePPT(filename = 'NOKES_Presentation.pptx', slidesContent = null) {
            const pptx = new PptxGenJS();
            // Title slide
            const slide1 = pptx.addSlide();
            slide1.background = {fill:'#0b0b1a'};
            slide1.addText('NOKES Presentation', {x:0.5,y:1.5,w:'90%',h:1.5,fontSize:36,color:'a78bfa',bold:true});
            slide1.addText('Powered by Neuro Optimizers KES', {x:0.5,y:3.5,w:'90%',h:0.5,fontSize:12,color:'94a3b8'});
            
            if(slidesContent && Array.isArray(slidesContent)) {
                slidesContent.forEach((text,i) => {
                    const slide = pptx.addSlide();
                    slide.addText(`Slide ${i+2}`, {x:0.5,y:0.5,w:'90%',h:0.8,fontSize:22,bold:true,color:'6ee7b7'});
                    slide.addText(text, {x:1,y:1.5,w:'80%',h:3,fontSize:16,color:'f1f5f9'});
                });
            } else {
                for(let i=0;i<3;i++) {
                    const slide = pptx.addSlide();
                    slide.addText(`Topic ${i+1}`, {x:0.5,y:0.5,fontSize:22,bold:true,color:'6ee7b7'});
                    slide.addText('Your content here — NOKES can customize this based on your request.', {x:1,y:2,w:'80%',h:2,fontSize:14,color:'f1f5f9'});
                }
            }
            pptx.writeFile({fileName:filename});
            addMessage('assistant', `📊 <strong>PowerPoint created:</strong> ${filename}`);
        }

                files.push({type:'excel', name:'NOKES_Dashboard.xlsx'});
            }

                response = "I've generated a **PowerPoint presentation** with a title slide and three content slides. Download it and customize further!";
                files.push({type:'pptx', name:'NOKES_Presentation.pptx'});
            }
            else if (lower.includes('code') || lower.includes('script') || lower.includes('function')) {
                response = "Here's a code snippet based on your request:\n```javascript\nfunction helloWorld() {\n  console.log('Hello from NOKES');\n}\n```\nI can also generate full script files.";
            }
            else if (filesForContext.length > 0) {
                response = "I've analyzed your uploaded file. I can create an Excel dashboard or PowerPoint summary from this data. Would you like me to generate one?";
            }

            }
            return {text: response, files};
        }

        .neural-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.1;
            background: 
                radial-gradient(circle at 20% 50%, #6C5CE7 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, #A8E6CF 0%, transparent 50%);
        }

        .app-container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
            gap: 0;
        }

        /* Sidebar Styles */
        .sidebar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .brand {
            padding: 20px 10px;
            margin-bottom: 20px;
        }

        .brand-name {
            font-size: 32px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .brand-subtitle {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-full {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);

        }

        }

            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            background: rgba(108, 92, 231, 0.1);
        }

        select option {
            background: #1a1a2e;
            color: white;
        }

        .capability-badge {
            display: inline-block;
            padding: 6px 12px;
            margin: 3px;
            background: rgba(108, 92, 231, 0.2);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 20px;
            font-size: 11px;
            color: #A8E6CF;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.03);

            display: flex;
            align-items: center;
            justify-content: space-between;
        }

            display: flex;

        }

            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;

        }

            animation: messageSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1);

        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message-avatar {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .message.user .message-avatar {
            background: var(--gradient);
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #FF6B6B, #A8E6CF);
        }

        .message-avatar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: inherit;
            filter: blur(10px);
            opacity: 0.5;
        }

        .avatar-emoji {
            position: relative;
            z-index: 1;
        }

            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 18px 22px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
        }

        .message.user .message-content {
            background: var(--gradient);
            border: none;
        }

        .message-content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message-content code {
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        /* Input Area */
        .input-container {
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);

        .main-input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            resize: none;
            padding: 8px;

            outline: none;

            color: rgba(255, 255, 255, 0.4);

        .action-buttons {
            display: flex;
            gap: 8px;

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--gradient);

        .btn-primary:hover {
            transform: translateY(-2px);

        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .file-upload {
            position: relative;
        }

        .file-upload input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* File Generation Cards */
        .generated-files {
            padding: 15px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            cursor: pointer;
        }

        .file-card:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: var(--primary);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-icon {
            font-size: 24px;
        }

        .file-name {
            font-size: 13px;
            font-weight: 500;
        }

        .file-type {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .processing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px;
            align-items: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(108, 92, 231, 0.5);
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
            .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="neural-bg"></div>
    
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-name">NOKES</div>
                <div class="brand-subtitle">Neuro Optimizers</div>
                <div class="brand-full">Knowledge Exploration Systems</div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">🤖 AI Model Configuration</div>
                <select id="aiProvider" onchange="updateModelOptions()">
                    <option value="openai">OpenAI (GPT-4)</option>
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="google">Google (Gemini Pro)</option>
                    <option value="local">Local Model (Llama)</option>
                </select>
                <input type="password" id="apiKey" placeholder="Enter API Key" style="margin-top:10px;">
                <select id="modelVersion" style="margin-top:10px;">
                    <option value="gpt-4-turbo">GPT-4 Turbo</option>
                    <option value="gpt-4">GPT-4</option>
                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                </select>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">🧠 Core Capabilities</div>
                <div>
                    <span class="capability-badge">📊 Excel Generation</span>
                    <span class="capability-badge">📊 PowerPoint Creation</span>
                    <span class="capability-badge">📈 Data Analysis</span>
                    <span class="capability-badge">💻 Code Generation</span>
                    <span class="capability-badge">📝 Document Writing</span>
                    <span class="capability-badge">🔍 Research</span>
                    <span class="capability-badge">🎨 Visual Design</span>
                    <span class="capability-badge">📉 Charts</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">📁 Generated Files</div>
                <div class="generated-files" id="fileList">
                    <div style="color: rgba(255,255,255,0.4); font-size: 13px; text-align: center; padding: 20px;">
                        No files generated yet
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <header class="chat-header">
                <div>
                    <h2 style="font-size: 18px; font-weight: 600;">NOKES Assistant</h2>
                    <p style="font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px;">
                        Advanced AI with Document Generation
                    </p>
                </div>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span id="modelStatus">GPT-4 Turbo Ready</span>
                </div>
            </header>

            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="message-avatar">
                        <span class="avatar-emoji">🧠</span>
                    </div>
                    <div class="message-content">
                        <strong>NOKES Initialized</strong> — Neuro Optimizers Knowledge Exploration Systems at your service.<br><br>
                        I can help you with:<br>
                        📊 <strong>Excel Dashboards</strong> — Create trackers, pivot tables, and data visualizations<br>
                        📊 <strong>PowerPoint Presentations</strong> — Generate professional slide decks<br>
                        📈 <strong>Data Analysis</strong> — Process raw data and extract insights<br>
                        💻 <strong>Code Generation</strong> — Write scripts in any language<br>
                        📝 <strong>Document Creation</strong> — Generate reports, proposals, and more<br><br>
                        <em>Upload your raw data or describe what you need, and I'll create it instantly.</em>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <div class="file-upload">
                        <button class="btn btn-secondary" title="Upload Files">
                            📎
                            <input type="file" id="fileInput" multiple accept=".csv,.xlsx,.xls,.json,.txt,.pdf" onchange="handleFileUpload(event)">
                        </button>
                    </div>
                    <textarea 
                        class="main-input" 
                        id="userInput" 
                        placeholder="Describe what you need: Excel dashboard, PowerPoint presentation, data analysis..."
                        rows="1"
                        onkeydown="handleKeyPress(event)"
                    ></textarea>
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="sendMessage()" id="sendBtn">
                            <span>▶</span> Send
                        </button>
                        <button class="btn btn-secondary" onclick="clearChat()">
                            🗑️
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==================== NOKES Core System ====================
        
        let conversationHistory = [];
        let uploadedFiles = [];
        let generatedFiles = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            updateModelStatus();
        });

        // ==================== AI Integration ====================
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message && uploadedFiles.length === 0) return;
            
            // Add user message to chat
            addMessageToChat('user', message || 'Processing uploaded files...');
            input.value = '';
            input.style.height = 'auto';
            
            // Show processing indicator
            const processingId = showProcessing();
            
            try {
                // Prepare context with file data
                let context = message;
                if (uploadedFiles.length > 0) {
                    context += '\n\nAttached Files:\n';
                    uploadedFiles.forEach((file, index) => {
                        context += `${index + 1}. ${file.name} (${file.type})\n`;
                        if (file.data) {
                            context += `Content preview: ${file.data.substring(0, 500)}...\n`;
                        }
                    });
                }
                
                // Call AI API
                const response = await callAI(context);
                
                // Remove processing indicator
                removeProcessing(processingId);
                
                // Add AI response
                addMessageToChat('assistant', response.text);
                
                // Generate files if AI suggests
                if (response.files && response.files.length > 0) {
                    response.files.forEach(file => generateDocument(file));
                }
                
                // Auto-detect file generation needs
                await autoDetectAndGenerate(response.text, context);
                
            } catch (error) {
                removeProcessing(processingId);
                addMessageToChat('assistant', `❌ Error: ${error.message}. Please check your API key and try again.`);
            }
        }

        async function callAI(prompt) {
            const provider = document.getElementById('aiProvider').value;
            const apiKey = document.getElementById('apiKey').value;
            const model = document.getElementById('modelVersion').value;
            
            if (!apiKey && provider !== 'local') {
                throw new Error('Please enter your API key in the sidebar');
            }
            
            // Build system prompt for NOKES
            const systemPrompt = `You are NOKES (Neuro Optimizers Knowledge Exploration Systems), an advanced AI assistant specialized in creating documents, dashboards, and presentations.

Your capabilities:
1. Generate Excel files with data analysis, pivot tables, charts
2. Create PowerPoint presentations with professional layouts
3. Process raw data and extract insights
4. Generate code in any programming language
5. Create structured documents and reports

When users request files, ALWAYS respond with a JSON block that includes file generation instructions:
\`\`\`json
{
  "response": "Your text response here",
  "files": [
    {
      "type": "excel",
      "name": "filename.xlsx",
      "data": [...],
      "analysis": "..."
    }
  ]
}
\`\`\`

Be proactive in suggesting file generation when users mention data, dashboards, presentations, or reports.`;

            // API call based on provider
            switch(provider) {
                case 'openai':
                    return await callOpenAI(apiKey, model, systemPrompt, prompt);
                case 'anthropic':
                    return await callAnthropic(apiKey, model, systemPrompt, prompt);
                case 'google':
                    return await callGoogleAI(apiKey, model, systemPrompt, prompt);
                default:
                    return await simulateLocalAI(prompt);
            }
        }

        async function callOpenAI(apiKey, model, systemPrompt, userPrompt) {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: [
                        { role: 'system', content: systemPrompt },
                        ...conversationHistory.slice(-10),
                        { role: 'user', content: userPrompt }
                    ],
                    temperature: 0.7,
                    max_tokens: 4000
                })
            });
            
            if (!response.ok) throw new Error(`OpenAI API error: ${response.status}`);
            
            const data = await response.json();
            const content = data.choices[0].message.content;
            
            // Parse potential file generation instructions
            return parseAIResponse(content);
        }

        async function callAnthropic(apiKey, model, systemPrompt, userPrompt) {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: 'claude-3-opus-20240229',
                    max_tokens: 4000,
                    system: systemPrompt,
                    messages: [
                        ...conversationHistory.slice(-10).map(msg => ({
                            role: msg.role === 'assistant' ? 'assistant' : 'user',
                            content: msg.content
                        })),
                        { role: 'user', content: userPrompt }
                    ]
                })
            });
            
            if (!response.ok) throw new Error(`Anthropic API error: ${response.status}`);
            
            const data = await response.json();
            return parseAIResponse(data.content[0].text);
        }

        async function callGoogleAI(apiKey, model, systemPrompt, userPrompt) {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `${systemPrompt}\n\nUser: ${userPrompt}`
                        }]
                    }]
                })
            });
            
            if (!response.ok) throw new Error(`Google AI error: ${response.status}`);
            
            const data = await response.json();
            return parseAIResponse(data.candidates[0].content.parts[0].text);
        }

        function parseAIResponse(content) {
            // Extract JSON if present
            const jsonMatch = content.match(/```json\n([\s\S]*?)\n```/);
            
            if (jsonMatch) {
                try {
                    const parsed = JSON.parse(jsonMatch[1]);
                    return {
                        text: parsed.response || content.replace(jsonMatch[0], ''),
                        files: parsed.files || []
                    };
                } catch (e) {
                    // JSON parsing failed, return raw content
                }
            }
            
            return { text: content, files: [] };
        }

        // ==================== Document Generation ====================
        
        async function autoDetectAndGenerate(response, userPrompt) {
            const combined = (response + ' ' + userPrompt).toLowerCase();
            
            // Detect Excel needs
            if (combined.includes('excel') || combined.includes('spreadsheet') || 
                combined.includes('dashboard') || combined.includes('data') ||
                combined.includes('tracker') || combined.includes('table')) {
                
                // Generate sample Excel
                generateExcelFile('NOKES_Dashboard.xlsx', uploadedFiles[0]?.data);
            }
            
            // Detect PowerPoint needs
            if (combined.includes('powerpoint') || combined.includes('presentation') || 
                combined.includes('slides') || combined.includes('deck')) {
                
                generatePowerPoint('NOKES_Presentation.pptx', response);
            }
            
            // Detect code needs
            if (combined.includes('code') || combined.includes('script') || 
                combined.includes('function') || combined.includes('program')) {
                
                generateCodeFile('NOKES_Code.txt', response);
            }
        }

        function generateExcelFile(filename, rawData) {
            const wb = XLSX.utils.book_new();
            
            // Parse raw data if available
            let data = [
                ['Date', 'Category', 'Value', 'Status'],
                ['2024-01-01', 'Sales', 15000, 'Complete'],
                ['2024-01-02', 'Marketing', 8500, 'In Progress'],
                ['2024-01-03', 'Development', 12000, 'Complete'],
                ['2024-01-04', 'Support', 6000, 'Pending'],
                ['2024-01-05', 'Sales', 18000, 'Complete']
            ];
            
            if (rawData) {
                try {
                    // Try to parse CSV/JSON data
                    if (typeof rawData === 'string' && rawData.includes(',')) {
                        data = rawData.split('\n').map(row => row.split(','));
                    }
                } catch (e) {
                    console.log('Using default data structure');
                }
            }
            
            const ws = XLSX.utils.aoa_to_sheet(data);
            
            // Add styling
            ws['!cols'] = [
                { wch: 12 },
                { wch: 15 },
                { wch: 12 },
                { wch: 15 }
            ];
            
            XLSX.utils.book_append_sheet(wb, ws, 'Dashboard');
            
            // Add analysis sheet
            const analysisData = [
                ['Metric', 'Value'],
                ['Total Value', data.slice(1).reduce((sum, row) => sum + (Number(row[2]) || 0), 0)],
                ['Average', data.slice(1).reduce((sum, row) => sum + (Number(row[2]) || 0), 0) / (data.length - 1)],
                ['Count', data.length - 1],
                ['Generated', new Date().toISOString()]
            ];
            
            const ws2 = XLSX.utils.aoa_to_sheet(analysisData);
            XLSX.utils.book_append_sheet(wb, ws2, 'Analysis');
            
            // Save file
            const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            saveGeneratedFile(filename, new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }));
            
            addMessageToChat('assistant', `📊 Generated Excel dashboard: **${filename}** with data analysis and visualizations.`);
        }

        function generatePowerPoint(filename, content) {
            const pptx = new PptxGenJS();
            
            // Title slide
            const slide1 = pptx.addSlide();
            slide1.background = { fill: '6C5CE7' };
            slide1.addText('NOKES Presentation', { 
                x: 1, y: 1.5, w: '80%', h: 1, 
                fontSize: 40, color: 'FFFFFF', bold: true 
            });
            slide1.addText('Generated by Neuro Optimizers Knowledge Exploration Systems', {
                x: 1, y: 3, w: '80%', h: 0.5,
                fontSize: 14, color: 'A8E6CF'
            });
            
            // Content slides based on AI response
            const points = content.split('\n').filter(line => line.trim().length > 10).slice(0, 5);
            
            points.forEach((point, index) => {
                const slide = pptx.addSlide();
                slide.addText(`Key Point ${index + 1}`, {
                    x: 0.5, y: 0.5, w: '90%', h: 0.8,
                    fontSize: 24, bold: true, color: '2D3436'
                });
                slide.addText(point.substring(0, 200), {
                    x: 1, y: 2, w: '80%', h: 2,
                    fontSize: 16, color: '636E72'
                });
            });
            
            // Save presentation
            pptx.writeFile({ fileName: filename });
            
            addMessageToChat('assistant', `📊 Created PowerPoint presentation: **${filename}** with ${points.length + 1} slides.`);
        }

        function generateCodeFile(filename, codeContent) {
            // Extract code blocks from response
            const codeMatch = codeContent.match(/```[\w]*\n([\s\S]*?)```/);
            const code = codeMatch ? codeMatch[1] : '// Generated code placeholder\nconsole.log("Hello from NOKES");';
            
            const blob = new Blob([code], { type: 'text/plain' });
            saveGeneratedFile(filename, blob);
        }

        function saveGeneratedFile(filename, blob) {
            saveAs(blob, filename);
            
            generatedFiles.push({
                name: filename,
                type: filename.split('.').pop().toUpperCase(),
                blob: blob,
                timestamp: new Date()
            });
            
            updateFileList();
        }

        // ==================== UI Functions ====================
        
        function addMessageToChat(role, content) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = role === 'user' ? '👤' : '🧠';
            const avatarEmoji = role === 'user' ? '👤' : '🧠';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">
                    <span class="avatar-emoji">${avatarEmoji}</span>
                </div>
                <div class="message-content">
                    ${marked.parse(content)}
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Update conversation history
            conversationHistory.push({ role: role, content: content });
        }

        function showProcessing() {
            const id = 'processing-' + Date.now();
            const messagesContainer = document.getElementById('chatMessages');
            const processingDiv = document.createElement('div');
            processingDiv.id = id;
            processingDiv.className = 'message assistant';
            processingDiv.innerHTML = `
                <div class="message-avatar">
                    <span class="avatar-emoji">🧠</span>
                </div>
                <div class="message-content">
                    <div class="processing-indicator">
                        <span>NOKES processing</span>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(processingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return id;
        }

        function removeProcessing(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }

        function updateFileList() {
            const fileList = document.getElementById('fileList');
            
            if (generatedFiles.length === 0) {
                fileList.innerHTML = '<div style="color: rgba(255,255,255,0.4); font-size: 13px; text-align: center; padding: 20px;">No files generated yet</div>';
                return;
            }
            
            fileList.innerHTML = generatedFiles.map((file, index) => `
                <div class="file-card" onclick="downloadFile(${index})">
                    <div class="file-info">
                        <span class="file-icon">${getFileIcon(file.type)}</span>
                        <div>
                            <div class="file-name">${file.name}</div>
                            <div class="file-type">${file.type} File</div>
                        </div>
                    </div>
                    <span>⬇️</span>
                </div>
            `).join('');
        }

        function getFileIcon(type) {
            const icons = {
                'XLSX': '📊',
                'PPTX': '📊',
                'TXT': '📝',
                'JS': '💻',
                'PY': '🐍',
                'PDF': '📄'
            };
            return icons[type] || '📁';
        }

        function downloadFile(index) {
            const file = generatedFiles[index];
            if (file && file.blob) {
                saveAs(file.blob, file.name);
            }
        }

        function handleFileUpload(event) {
            const files = event.target.files;
            uploadedFiles = [];
            
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    uploadedFiles.push({
                        name: file.name,
                        type: file.type,
                        data: e.target.result
                    });
                    
                    if (uploadedFiles.length === files.length) {
                        addMessageToChat('user', `📎 Uploaded ${files.length} file(s): ${uploadedFiles.map(f => f.name).join(', ')}`);
                    }
                };
                reader.readAsText(file);
            });
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function clearChat() {
            document.getElementById('chatMessages').innerHTML = '';
            conversationHistory = [];
            uploadedFiles = [];
            addMessageToChat('assistant', 'Chat cleared. NOKES ready for new tasks.');
        }

        function updateModelOptions() {
            const provider = document.getElementById('aiProvider').value;
            const modelSelect = document.getElementById('modelVersion');
            
            const models = {
                'openai': [
                    { value: 'gpt-4-turbo', text: 'GPT-4 Turbo (Most Powerful)' },
                    { value: 'gpt-4', text: 'GPT-4' },
                    { value: 'gpt-3.5-turbo', text: 'GPT-3.5 Turbo (Fast)' }
                ],
                'anthropic': [
                    { value: 'claude-3-opus', text: 'Claude 3 Opus (Most Powerful)' },
                    { value: 'claude-3-sonnet', text: 'Claude 3 Sonnet' }
                ],
                'google': [
                    { value: 'gemini-pro', text: 'Gemini Pro' }
                ],
                'local': [
                    { value: 'local', text: 'Local Processing' }
                ]
            };
            
            modelSelect.innerHTML = (models[provider] || []).map(m => 
                `<option value="${m.value}">${m.text}</option>`
            ).join('');
            
            updateModelStatus();
        }

        function updateModelStatus() {
            const provider = document.getElementById('aiProvider').value;
            const model = document.getElementById('modelVersion').value;
            document.getElementById('modelStatus').textContent = `${model.toUpperCase()} Ready`;
        }

        function loadSettings() {
            // Load saved API key if exists
            const savedKey = localStorage.getItem('nokes_api_key');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
            }
        }

        // Save API key when changed
        document.getElementById('apiKey').addEventListener('change', function(e) {
            localStorage.setItem('nokes_api_key', e.target.value);
        });

        // Auto-resize textarea
        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Initial model status
        updateModelOptions();
    </script>
</body>
</html>
