<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOKES Pro - Premium AI Assistant</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 1px;
            background: #16213e;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
            border-right: 1px solid #533483;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            gap: 24px;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 12px;
            background: rgba(83, 52, 131, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(83, 52, 131, 0.5);
        }

        .logo-icon {
            font-size: 32px;
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-text p {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 2px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #000;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 700;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .nav-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #6b7280;
            letter-spacing: 1px;
            padding: 0 8px;
            margin-bottom: 4px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            color: #d1d5db;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .nav-btn:hover {
            background: rgba(167, 139, 250, 0.1);
            border-color: rgba(167, 139, 250, 0.3);
            color: #a78bfa;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
            border-color: #a78bfa;
            color: #fff;
        }

        .nav-icon {
            font-size: 16px;
            width: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 12px;
            background: rgba(167, 139, 250, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(167, 139, 250, 0.2);
            margin-top: auto;
        }

        .stat {
            text-align: center;
        }

        .stat-val {
            font-size: 18px;
            font-weight: 700;
            color: #a78bfa;
        }

        .stat-label {
            font-size: 10px;
            color: #6b7280;
            margin-top: 2px;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px 24px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid #533483;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
        }

        .mode-switch {
            display: flex;
            gap: 4px;
            background: rgba(83, 52, 131, 0.2);
            border: 1px solid rgba(83, 52, 131, 0.4);
            border-radius: 20px;
            padding: 4px;
        }

        .mode-switch button {
            padding: 6px 14px;
            border: none;
            background: transparent;
            color: #9ca3af;
            border-radius: 16px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .mode-switch button.active {
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
            color: #fff;
        }

        /* Chat */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(167, 139, 250, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: rgba(59, 130, 246, 0.2);
        }

        .bubble {
            max-width: 60%;
            background: rgba(83, 52, 131, 0.3);
            border: 1px solid rgba(167, 139, 250, 0.2);
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            color: #fff;
        }

        .bubble strong {
            color: #06b6d4;
        }

        /* Input */
        .input-section {
            padding: 16px 24px;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid #533483;
            display: flex;
            gap: 12px;
            backdrop-filter: blur(10px);
        }

        .input-box {
            flex: 1;
            display: flex;
            background: rgba(83, 52, 131, 0.2);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 12px;
            padding: 8px 12px;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .input-box:focus-within {
            border-color: #a78bfa;
            background: rgba(83, 52, 131, 0.3);
            box-shadow: 0 0 16px rgba(167, 139, 250, 0.2);
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-size: 14px;
            resize: none;
            outline: none;
            max-height: 100px;
            font-family: inherit;
        }

        .input-box textarea::placeholder {
            color: #6b7280;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(167, 139, 250, 0.3);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(167, 139, 250, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(167, 139, 250, 0.5);
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                flex-direction: row;
                border-right: none;
                border-bottom: 1px solid #533483;
                padding: 12px;
                overflow-x: auto;
            }

            .bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon">🧠</div>
                <div class="logo-text">
                    <h1>NOKES</h1>
                    <p>Premium AI</p>
                    <span class="badge">✨ Pro</span>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-title">Chat</div>
                <button class="nav-btn active" onclick="startChat()">
                    <span class="nav-icon">💬</span>
                    <span>New Chat</span>
                </button>
                <button class="nav-btn" onclick="showHistory()">
                    <span class="nav-icon">📜</span>
                    <span>History</span>
                </button>
            </div>

            <div class="nav-section">
                <div class="nav-title">Generate</div>
                <button class="nav-btn" onclick="quickGen('Excel Dashboard')">
                    <span class="nav-icon">📊</span>
                    <span>Excel</span>
                </button>
                <button class="nav-btn" onclick="quickGen('PowerPoint Deck')">
                    <span class="nav-icon">🎨</span>
                    <span>Presentation</span>
                </button>
                <button class="nav-btn" onclick="quickGen('Code Sample')">
                    <span class="nav-icon">💻</span>
                    <span>Code</span>
                </button>
            </div>

            <div class="nav-section">
                <div class="nav-title">Tools</div>
                <button class="nav-btn" onclick="analyze()">
                    <span class="nav-icon">📈</span>
                    <span>Analysis</span>
                </button>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-val" id="msgCount">0</div>
                    <div class="stat-label">Messages</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="fileCount">0</div>
                    <div class="stat-label">Files</div>
                </div>
            </div>
        </div>

        <!-- Main -->
        <div class="main">
            <div class="header">
                <div class="header-title">🧠 NOKES Pro - Premium AI</div>
                <div class="mode-switch">
                    <button class="active" onclick="switchMode(this, 'chat')">💬 Chat</button>
                    <button onclick="switchMode(this, 'analyze')">📊 Analyze</button>
                    <button onclick="switchMode(this, 'create')">✨ Create</button>
                </div>
            </div>

            <div class="chat-area">
                <div class="messages" id="messages"></div>

                <div class="input-section">
                    <div class="input-box">
                        <textarea id="input" placeholder="Ask NOKES anything..." rows="1"></textarea>
                    </div>
                    <button class="send-btn" onclick="send()">↓</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let msgCount = 0;
        let fileCount = 0;
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');

        function addMsg(role, text) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🧠'}</div>
                <div class="bubble">${text}</div>
            `;
            messagesEl.appendChild(msg);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            if (role === 'user') {
                msgCount++;
                document.getElementById('msgCount').textContent = msgCount;
            }
        }

        function startChat() {
            messagesEl.innerHTML = '';
            msgCount = 0;
            document.getElementById('msgCount').textContent = '0';
            welcome();
        }

        function welcome() {
            addMsg('assistant', `<strong>👋 Welcome to NOKES Pro</strong><br><br>I'm your premium AI, completely free and <strong>better than Claude Pro & GPT-4 Pro</strong>.<br><br><strong>What I do:</strong><br>✅ Deep analysis & research<br>✅ Excel dashboards<br>✅ PowerPoint presentations<br>✅ Code generation<br>✅ Data visualization<br><br><em>Try: "Analyze data", "Create presentation", or "Write code"</em>`);
        }

        function showHistory() {
            addMsg('assistant', '📜 <strong>Chat History</strong><br>Your conversations are saved locally in your browser.');
        }

        function quickGen(type) {
            inputEl.value = 'Generate ' + type;
            inputEl.focus();
        }

        function analyze() {
            addMsg('assistant', '📈 <strong>Data Analysis</strong><br>Upload files and I\'ll analyze them for insights.');
        }

        function switchMode(btn, mode) {
            document.querySelectorAll('.mode-switch button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            addMsg('assistant', `Switched to <strong>${mode.toUpperCase()}</strong> mode. Ready to help!`);
        }

        function generateResponse(prompt) {
            const lower = prompt.toLowerCase();
            if (lower.includes('hello') || lower.includes('hi')) {
                return '👋 Hey there! I\'m NOKES Pro. How can I help?';
            }
            if (lower.includes('analyze')) {
                return '📊 I\'ve analyzed your data and found key insights:<br>• Top performing segment<br>• Growth trends<br>• Opportunities for optimization';
            }
            if (lower.includes('generate') || lower.includes('create')) {
                return '✨ I\'ve created your file! Ready to download.';
            }
            return '🤔 I\'m here to help! Ask me to analyze data, create documents, write code, or anything else.';
        }

        function send() {
            const text = inputEl.value.trim();
            if (!text) return;
            inputEl.value = '';
            addMsg('user', text);
            const typing = document.createElement('div');
            typing.className = 'message';
            typing.innerHTML = '<div class="avatar">🧠</div><div class="bubble">⋯ Thinking...</div>';
            messagesEl.appendChild(typing);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            setTimeout(() => {
                typing.remove();
                addMsg('assistant', generateResponse(text));
            }, 600);
        }

        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });

        welcome();
    </script>
</body>
</html>
