<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOKES Pro - Premium AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #1f2937;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #f9fafb;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            gap: 32px;
        }

        .logo-section {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .logo-icon {
            font-size: 32px;
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 800;
            color: #111827;
            letter-spacing: -1px;
        }

        .logo-text p {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
            font-weight: 500;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 8px;
            margin-bottom: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 12px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            color: #4b5563;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .nav-item:hover {
            background: #f3f4f6;
            border-color: #e5e7eb;
            color: #1f2937;
        }

        .nav-item.active {
            background: #3b82f6;
            color: #ffffff;
            border-color: #3b82f6;
        }

        .nav-item:active {
            transform: scale(0.98);
        }

        .nav-icon {
            font-size: 18px;
        }

        .stats-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 16px;
            background: #f3f4f6;
            border-radius: 12px;
            margin-top: auto;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: #3b82f6;
        }

        .stat-name {
            font-size: 11px;
            color: #6b7280;
            margin-top: 4px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        .top-bar {
            height: 64px;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
        }

        .top-title {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
        }

        .mode-buttons {
            display: flex;
            gap: 8px;
        }

        .mode-btn {
            padding: 8px 16px;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .mode-btn:hover {
            background: #f3f4f6;
        }

        .mode-btn.active {
            background: #3b82f6;
            color: #ffffff;
            border-color: #3b82f6;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        .msg.user {
            justify-content: flex-end;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .msg.user .avatar {
            background: #3b82f6;
            color: white;
        }

        .content {
            max-width: 65%;
            background: #f3f4f6;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .msg.user .content {
            background: #3b82f6;
            color: #ffffff;
        }

        .content strong {
            color: inherit;
            font-weight: 700;
        }

        .content em {
            color: inherit;
            font-style: italic;
        }

        /* Input Area */
        .input-area {
            padding: 20px 32px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #ffffff;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 10px 14px;
            transition: all 0.2s ease;
            gap: 8px;
        }

        .input-wrapper:focus-within {
            border-color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 14px;
            color: #1f2937;
            resize: none;
            outline: none;
            max-height: 100px;
            font-family: inherit;
        }

        .input-wrapper textarea::placeholder {
            color: #9ca3af;
        }

        .send-button {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #3b82f6;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            font-weight: 700;
        }

        .send-button:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .send-button:active {
            transform: translateY(0);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        @media (max-width: 768px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 12px;
                gap: 12px;
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
                overflow-x: auto;
            }

            .content {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo-section">
                <div class="logo-icon">🧠</div>
                <div class="logo-text">
                    <h1>NOKES</h1>
                    <p>Premium AI Chat</p>
                </div>
            </div>

            <div>
                <div class="nav-label">Chat</div>
                <div class="nav-menu">
                    <button class="nav-item active" onclick="newChat()">
                        <span class="nav-icon">💬</span>
                        <span>New Chat</span>
                    </button>
                    <button class="nav-item" onclick="viewHistory()">
                        <span class="nav-icon">📋</span>
                        <span>History</span>
                    </button>
                </div>
            </div>

            <div>
                <div class="nav-label">Tools</div>
                <div class="nav-menu">
                    <button class="nav-item" onclick="generateExcel()">
                        <span class="nav-icon">📊</span>
                        <span>Excel</span>
                    </button>
                    <button class="nav-item" onclick="generatePPT()">
                        <span class="nav-icon">🎨</span>
                        <span>Presentation</span>
                    </button>
                    <button class="nav-item" onclick="analyzeData()">
                        <span class="nav-icon">📈</span>
                        <span>Analysis</span>
                    </button>
                </div>
            </div>

            <div class="stats-box">
                <div class="stat-item">
                    <div class="stat-number" id="msgCount">0</div>
                    <div class="stat-name">Messages</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="genCount">0</div>
                    <div class="stat-name">Generated</div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="top-title">🧠 NOKES Pro</div>
                <div class="mode-buttons">
                    <button class="mode-btn active" onclick="setMode(this, 'chat')">💬 Chat</button>
                    <button class="mode-btn" onclick="setMode(this, 'analyze')">📊 Analyze</button>
                    <button class="mode-btn" onclick="setMode(this, 'create')">✨ Create</button>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-container">
                <div class="messages-area" id="messages"></div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="userInput" placeholder="Ask me anything..." rows="1"></textarea>
                    </div>
                    <button class="send-button" onclick="sendMessage()">↓</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let messageCount = 0;
        let generatedCount = 0;
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('userInput');

        function addMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${role}`;
            msgDiv.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🧠'}</div>
                <div class="content">${text}</div>
            `;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            if (role === 'user') {
                messageCount++;
                document.getElementById('msgCount').textContent = messageCount;
            }
        }

        function newChat() {
            messagesDiv.innerHTML = '';
            messageCount = 0;
            document.getElementById('msgCount').textContent = '0';
            welcome();
        }

        function welcome() {
            addMessage('assistant', `<strong>Welcome to NOKES Pro</strong><br><br>I'm your premium AI assistant, completely free and better than Claude Pro & GPT-4 Pro.<br><br><strong>I can help with:</strong><br>• Deep analysis & insights<br>• Excel dashboards<br>• Presentations & documents<br>• Code generation<br>• Data visualization<br><br>Just ask me anything!`);
        }

        function viewHistory() {
            addMessage('assistant', '📋 <strong>Chat History</strong><br>Your conversations are saved locally in your browser.');
        }

        function generateExcel() {
            inputField.value = 'Create an Excel dashboard with sales data';
            inputField.focus();
        }

        function generatePPT() {
            inputField.value = 'Generate a professional PowerPoint presentation';
            inputField.focus();
        }

        function analyzeData() {
            addMessage('assistant', '📈 <strong>Data Analysis</strong><br>Upload a file and I\'ll provide detailed insights and visualizations.');
        }

        function setMode(btn, mode) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            addMessage('assistant', `Switched to <strong>${mode.toUpperCase()}</strong> mode.`);
        }

        function getResponse(text) {
            const lower = text.toLowerCase();
            if (lower.includes('hello') || lower.includes('hi')) {
                return '👋 <strong>Hey!</strong> How can I help you today?';
            }
            if (lower.includes('excel') || lower.includes('dashboard')) {
                return '✅ <strong>Excel dashboard created!</strong><br>Professional spreadsheet with:<br>• Data tables<br>• Charts & graphs<br>• Formulas & calculations<br>Ready to download!';
            }
            if (lower.includes('powerpoint') || lower.includes('presentation')) {
                return '✅ <strong>Presentation created!</strong><br>10-slide deck with:<br>• Professional layout<br>• Charts & visuals<br>• Speaker notes<br>Ready to download!';
            }
            if (lower.includes('analyze') || lower.includes('analysis')) {
                return '📊 <strong>Analysis Complete!</strong><br>Key findings:<br>• Top performers identified<br>• Trends detected<br>• Recommendations provided';
            }
            return '💡 <strong>Got it!</strong> I can help with analysis, document generation, coding, and much more. What would you like?';
        }

        function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;
            inputField.value = '';
            addMessage('user', text);
            const typingMsg = document.createElement('div');
            typingMsg.className = 'msg';
            typingMsg.innerHTML = '<div class="avatar">🧠</div><div class="content">⋯ Thinking...</div>';
            messagesDiv.appendChild(typingMsg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            setTimeout(() => {
                typingMsg.remove();
                addMessage('assistant', getResponse(text));
            }, 700);
        }

        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        welcome();
    </script>
</body>
</html>
